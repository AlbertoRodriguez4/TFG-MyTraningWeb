name: Docker Backend CICD
on:
 push:
   branches: [ "main" ]
 pull_request:
   branches: [ "main" ]
env:
 EKS_CLUSTER_NAME: mi-cluster
 AWS_REGION: us-east-1
jobs:
 build:
   name: Backend Deployment
   runs-on: ubuntu-latest
   steps:
   - name: Check out code
     uses: actions/checkout@v2
   - name: Set up Docker Buildx
     uses: docker/setup-buildx-action@v3
   - name: Login to Docker Hub
     uses: docker/login-action@v3
     with:
       username: ${{ secrets.DOCKER_USERNAME }}
       password: ${{ secrets.DOCKER_PASSWORD }}
   - name: Docker Metadata for Backend Image
     id: docker_meta
     uses: docker/metadata-action@v5
     with:
       images: albertorodriguezpenalva/back-aws
       flavor: |
         latest=false
       tags: |
         type=raw,value=latest
   - name: Build and Push Backend Docker Image
     id: docker_build
     uses: docker/build-push-action@v5
     with:
       context: .
       file: ./Dockerfile
       push: true
       tags: ${{ steps.docker_meta.outputs.tags }}
       labels: ${{ steps.docker_meta.outputs.labels }}
       cache-from: type=gha
       cache-to: type=gha,mode=max
       platforms: linux/amd64
   - name: Configure AWS credentials
     uses: aws-actions/configure-aws-credentials@v1
     with:
       aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
       aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
       aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
       aws-region: ${{ env.AWS_REGION }}
   - name: Update kube config
     run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION
   - name: Deploy backend (api, pgadmin, postgres)
     run: |
       kubectl apply -f manifest/api-deployment.yml
       kubectl apply -f manifest/pgadmin-deployment.yml
       kubectl apply -f manifest/postgres-deployment.yml
   - name: Restart API deployment
     run: |
       kubectl rollout restart deployment api 
     