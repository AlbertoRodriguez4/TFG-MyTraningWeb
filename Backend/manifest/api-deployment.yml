apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: albertorodriguezpenalva/back-aws:latest
        ports:
        - containerPort: 6873
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ConnectionStrings__DefaultConnection
          value: "Host=postgres;Port=5432;Database=thetraininghub;Username=postgres;Password=postgres"
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  type: LoadBalancer 
  selector:
    app: api
  ports:
  - port: 6873
    targetPort: 6873
