services:
  postgres:
    image: postgres
    restart: always
    ports:
      - "3786:5432"
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: "a26873@svalero.com"
      PGADMIN_DEFAULT_PASSWORD: "password"
    ports:
      - "5050:80"
    depends_on:
      - postgres

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "6873:6873"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=postgres;Username=postgres;Password=password
    depends_on:
      - postgres

  front:
    image: albertorodriguezpenalva/front-aws:latest
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data: